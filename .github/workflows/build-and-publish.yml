name: Build and Publish Docker Image

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_DH: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME_DH: lumbermanufactory/s3-sync
  IMAGE_NAME_GHCR: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY_DH }}/${{ env.IMAGE_NAME_DH }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
          tags: |
            # Manual dispatch: only SHA tag
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}
            # Push to main: latest + branch + SHA
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' }}
            type=sha,enable=${{ github.event_name == 'push' }}
            # Release: semver tags
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation (GHCR)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
